<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WORD MINE!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FFD700;
            --danger: #FF4444;
            --success: #4CAF50;
            --dark: #333;
            --highlight: #00e5ff;
            --sky-top: #4facfe;
            --sky-bottom: #00f2fe;
            --cloud: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            font-family: 'Fredoka', sans-serif; overflow: hidden; 
            background-image: url('bg.png'); 
            background-size: cover; 
            background-position: center; 
            background-repeat: no-repeat;
            position: relative;
        }

        body::before, body::after {
            content: ""; position: absolute; background: var(--cloud); border-radius: 50%; z-index: 0;
        }
        body::before { width: 400px; height: 400px; bottom: -150px; right: -100px; }
        body::after { width: 250px; height: 250px; top: 50px; left: -50px; }

        .page { display: none; width: 100%; height: 100%; position: absolute; z-index: 10; }
        .active { display: flex; flex-direction: column; align-items: center; }

        #home-page { background: transparent; justify-content: center; gap: 20px; }
        
        .btn-ui {
            padding: 15px 30px;
            font-size: 1.5rem;
            font-family: 'Fredoka';
            font-weight: 600;
            background: white;
            border: 5px solid var(--dark);
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--dark);
            transition: transform 0.1s;
            min-width: 250px;
        }

        .btn-ui:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark); }
        .btn-start { background: var(--primary); }

        #game-page { background: transparent; padding-top: 10px; }

        .game-header { width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 10px; background: rgba(0,0,0,0.3); }

        .scoreboard { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .team-box {
            background: #eee;
            padding: 10px;
            border: 3px solid var(--dark);
            border-radius: 15px;
            text-align: center;
            min-width: 110px;
            transition: all 0.3s;
        }

        .team-box.active-turn {
            background: var(--highlight);
            transform: scale(1.1);
            border-color: white;
            box-shadow: 0 0 15px var(--highlight);
        }

        .score-val { font-size: 1.8rem; font-weight: bold; display: block; }

        #word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            width: 95%;
            overflow-y: auto;
            padding: 20px;
            margin-bottom: 80px;
        }

        .word-card {
            background: white;
            border: 4px solid var(--dark);
            border-radius: 15px;
            padding: 25px 5px;
            font-size: 1.5rem;
            text-align: center;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 0 var(--dark);
        }

        #result-page { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0,0,0,0.85);
        }

        #result-text { font-size: 5rem; color: white; text-shadow: 5px 5px 0px #000; margin-bottom: 20px; text-align: center; white-space: pre-line; }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; color: white; padding: 40px; text-align: center;
        }

        textarea { width: 80%; height: 150px; font-size: 1.2rem; border-radius: 10px; padding: 10px; }
        .t-name { width: 80%; padding: 10px; margin: 5px; font-size: 1.1rem; border-radius: 8px; border: none; }

        @keyframes textShake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-10px);} 75% {transform: translateX(10px);} }
        .shake-text { animation: textShake 0.1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }
        .pulse { animation: pulse 0.5s infinite; }

        .footer-controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; z-index: 20; }
    </style>
</head>
<body>

    <audio id="bg-music" loop src="https://actions.google.com/sounds/v1/weather/rain_heavy_loud.ogg"></audio> 
    
    <audio id="snd-point" src="https://actions.google.com/sounds/v1/cartoon/clime_out.ogg"></audio>
    <audio id="snd-bomb" src="https://actions.google.com/sounds/v1/science_fiction/low_fuzz_explosion.ogg"></audio>
    <audio id="snd-star" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

    <div id="home-page" class="page active">
        <h1 style="color: white; font-size: 4rem; text-shadow: 4px 4px 0 #000;">WORD MINE!</h1>
        <button class="btn-ui btn-start" onclick="startGame()">START GAME</button>
        <button class="btn-ui" onclick="showOverlay('settings')">EDIT WORDS</button>
        <button class="btn-ui" onclick="showOverlay('groups')">TEAM NAMES</button>
    </div>

    <div id="game-page" class="page">
        <div class="game-header">
            <button class="btn-ui" style="min-width:80px; padding:5px" onclick="location.reload()">🏠 HOME</button>
            <div class="scoreboard" id="scoreboard"></div>
            <button class="btn-ui" id="mute-btn" style="min-width:60px; padding:5px; font-size: 1.2rem;" onclick="toggleMusic()">🔊</button>
        </div>
        <div id="word-grid"></div>
        <div class="footer-controls">
            <button class="btn-ui" style="background: var(--danger); color: white;" onclick="endGame()">🏁 FINISH GAME</button>
        </div>
    </div>

    <div id="result-page">
        <h1 id="result-text"></h1>
        <button id="next-btn" class="btn-ui" style="font-size: 2rem; background: var(--primary);" onclick="closeResult()">NEXT TEAM >></button>
    </div>

    <div id="settings" class="overlay">
        <h1>ENTER WORDS</h1>
        <textarea id="word-input">Apple, Banana, Cherry, Dragon, Eagle, Forest, Grapes, Helmet, Island, Jungle, Koala, Lemon</textarea><br><br>
        <button class="btn-ui" onclick="hideOverlays()">SAVE</button>
    </div>

    <div id="groups" class="overlay">
        <h1>TEAMS</h1>
        <input type="text" class="t-name" value="Team 1">
        <input type="text" class="t-name" value="Team 2">
        <input type="text" class="t-name" placeholder="Team 3">
        <input type="text" class="t-name" placeholder="Team 4"><br><br>
        <button class="btn-ui" onclick="setupTeams()">SAVE TEAMS</button>
    </div>

    <script>
        let teamData = [];
        let currentCard = null;
        let currentTurn = 0;

        function showOverlay(id) { document.getElementById(id).style.display = 'block'; }
        function hideOverlays() { document.querySelectorAll('.overlay').forEach(el => el.style.display = 'none'); }

        function setupTeams() {
            teamData = [];
            document.querySelectorAll('.t-name').forEach((input) => {
                if (input.value.trim() !== "") teamData.push({ name: input.value.trim(), score: 0 });
            });
            hideOverlays();
        }
        setupTeams();

        function toggleMusic() {
            const music = document.getElementById('bg-music');
            const btn = document.getElementById('mute-btn');
            if (music.paused) { music.play(); btn.innerText = "🔊"; } 
            else { music.pause(); btn.innerText = "🔇"; }
        }

        function startGame() {
            if(teamData.length === 0) { alert("Add teams first!"); return; }
            
            const music = document.getElementById('bg-music');
            music.volume = 0.2; 
            music.play().catch(e => console.log("Music blocked"));

            const wordInput = document.getElementById('word-input').value;
            const words = wordInput.split(/[ ,]+/).filter(w => w !== "");
            const grid = document.getElementById('word-grid');
            grid.innerHTML = '';

            // --- RANDOM ASSIGNMENT LOGIC ---
            // Create roles for EVERY card
            let roles = new Array(words.length).fill('normal');
            
            // Assign some Bombs and Stars
            let bombCount = Math.min(3, Math.floor(words.length / 3));
            let starCount = 2;
            for(let i=0; i < bombCount; i++) roles[i] = 'bomb';
            for(let i=bombCount; i < bombCount + starCount; i++) roles[i] = 'star';

            // Shuffle the roles
            roles.sort(() => 0.5 - Math.random());

            // Build the grid
            words.forEach((w, index) => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerText = w.toUpperCase();
                
                const cardType = roles[index]; // Assign secret role by position
                card.onclick = () => reveal(card, cardType); 
                grid.appendChild(card);
            });

            renderScoreboard();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('game-page').classList.add('active');
        }

        function renderScoreboard() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = '';
            teamData.forEach((t, i) => {
                const activeClass = (i === currentTurn) ? 'active-turn' : '';
                sb.innerHTML += `
                <div class="team-box ${activeClass}" id="team-${i}">
                    <div style="font-size:0.8rem">${t.name}</div>
                    <span class="score-val" id="score-${i}">${t.score}</span>
                </div>`;
            });
        }

        function reveal(card, type) {
            currentCard = card;
            const resPage = document.getElementById('result-page');
            const resText = document.getElementById('result-text');
            resText.classList.remove('shake-text', 'pulse');

            let points = 0;

            if (type === 'bomb') {
                points = -5;
                resText.innerText = `💣 BOMB!\n-5 pts for ${teamData[currentTurn].name}`;
                resText.style.color = "var(--danger)";
                resText.classList.add('shake-text');
                document.getElementById('snd-bomb').currentTime = 0;
                document.getElementById('snd-bomb').play();
            } else if (type === 'star') {
                points = 10;
                resText.innerText = `⭐ STAR!\n+10 pts for ${teamData[currentTurn].name}`;
                resText.style.color = "var(--primary)";
                resText.classList.add('pulse');
                document.getElementById('snd-star').currentTime = 0;
                document.getElementById('snd-star').play();
            } else {
                points = 2;
                resText.innerText = "✅ CORRECT\n+2 pts";
                resText.style.color = "var(--success)";
                document.getElementById('snd-point').currentTime = 0;
                document.getElementById('snd-point').play();
            }

            teamData[currentTurn].score += points;
            resPage.style.display = 'flex';
        }

        function closeResult() {
            document.getElementById('result-page').style.display = 'none';
            if (currentCard) {
                currentCard.style.visibility = 'hidden';
                currentCard.style.pointerEvents = 'none';
            }
            currentTurn = (currentTurn + 1) % teamData.length;
            renderScoreboard();

            const visibleCards = Array.from(document.querySelectorAll('.word-card')).filter(c => c.style.visibility !== 'hidden');
            if (visibleCards.length === 0) endGame();
        }

        function endGame() {
            const music = document.getElementById('bg-music');
            music.pause();

            let winner = teamData.reduce((prev, current) => (prev.score > current.score) ? prev : current);
            const resPage = document.getElementById('result-page');
            const resText = document.getElementById('result-text');
            
            resText.classList.remove('shake-text', 'pulse');
            resText.innerHTML = `🏆 WINNER: ${winner.name}<br><span style="font-size:3rem">${winner.score} Points</span>`;
            resText.style.color = "white";
            
            const nextBtn = document.getElementById('next-btn');
            nextBtn.innerText = "PLAY AGAIN";
            nextBtn.onclick = () => location.reload();
            resPage.style.display = 'flex';
        }
    </script>
</body>
</html>
